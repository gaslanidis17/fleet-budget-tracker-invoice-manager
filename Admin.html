<!doctype html>
<html>
  <head>
    <base target="_top">
    <style>
      *{box-sizing:border-box} body{font:14px Arial,sans-serif;color:#17251f;margin:0;padding:18px;background:#f7faf8} h2{margin:0 0 6px;color:#12372a} p{color:#64766d;line-height:1.45} label{display:block;font-weight:700;margin:15px 0 6px} input,select,textarea,button{width:100%;padding:10px;border:1px solid #cbdcd1;border-radius:8px;font:inherit} textarea{min-height:70px;resize:vertical} button{margin-top:16px;background:#1b5e45;color:white;border:0;font-weight:700;cursor:pointer} button:disabled{opacity:.55;cursor:wait}.note{background:#fff8e1;border:1px solid #ead9a7;padding:10px;border-radius:8px;color:#6e5200}.result{margin-top:14px;padding:10px;border-radius:8px;background:#e8f5e9;color:#22543d;display:none}.error{background:#fdeaea;color:#9b2222}
    </style>
  </head>
  <body>
    <h2>Upload invoice</h2>
    <p>The file is stored in a dedicated fleet folder and renamed with its exact upload timestamp.</p>
    <div class="note">Employee fallback uploader. Use the web app for the full workflow; portfolio demo mode never stores files or creates Gmail drafts.</div>
    <label for="fleet">Fleet</label><select id="fleet"><option value="">Loading…</option></select>
    <label for="period">Invoice period</label><input id="period" type="month" value="2026-03">
    <label for="amount">Amount (EUR)</label><input id="amount" type="number" min="0.01" step="0.01" placeholder="4500">
    <label for="file">PDF invoice (max 5 MB)</label><input id="file" type="file" accept="application/pdf">
    <label for="notes">Notes</label><textarea id="notes" placeholder="Optional review note"></textarea>
    <button id="upload" onclick="uploadInvoice()">Store invoice in Drive</button>
    <div id="result" class="result"></div>
    <script>
      const fleet = document.getElementById('fleet'); const result = document.getElementById('result'); const button = document.getElementById('upload');
      google.script.run.withSuccessHandler(data=>{fleet.innerHTML='<option value="">Choose a fleet</option>'+data.fleets.map(f=>`<option value="${f.fleetId}">${f.fleetId} · ${f.company}</option>`).join('')}).withFailureHandler(fail).getSheetAdminBootstrap();
      function uploadInvoice(){
        const file=document.getElementById('file').files[0]; if(!file)return fail({message:'Choose a PDF file.'}); if(file.type!=='application/pdf')return fail({message:'Only PDF files are accepted.'}); if(file.size>5*1024*1024)return fail({message:'PDF must be 5 MB or smaller.'});
        button.disabled=true; button.textContent='Uploading…'; const reader=new FileReader();
        reader.onload=()=>{const payload={fleetId:fleet.value,period:document.getElementById('period').value,amount:document.getElementById('amount').value,notes:document.getElementById('notes').value,mimeType:file.type,base64:reader.result.split(',')[1]}; google.script.run.withSuccessHandler(done).withFailureHandler(fail).saveInvoiceFromSheet(payload)}; reader.readAsDataURL(file);
      }
      function done(data){button.disabled=false;button.textContent='Store invoice in Drive';result.className='result';result.style.display='block';result.innerHTML=`Stored <strong>${data.invoiceId}</strong><br>${data.filename}<br><br><button onclick="draft('${data.invoiceId}')">Create Gmail draft</button>`}
      function draft(id){button.disabled=true;google.script.run.withSuccessHandler(data=>{button.disabled=false;result.innerHTML+=`<p>Draft created for <strong>${data.recipient}</strong>. Review it in Gmail before sending.</p>`}).withFailureHandler(fail).createInvoiceDraftFromSheet(id)}
      function fail(error){button.disabled=false;button.textContent='Store invoice in Drive';result.className='result error';result.style.display='block';result.textContent=error.message||error}
    </script>
  </body>
</html>
